<!DOCTYPE html>

<head>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@400;600;700&display=swap');
*{font-family:'Poppins',sans-serif;}

body{
min-height:100vh;
background:radial-gradient(circle at top,#020617,#000);
overflow:hidden;
}

/* card */
.card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(30px);
border-radius:30px;
padding:30px;
box-shadow:0 0 40px gold,0 0 120px red;
border:2px solid rgba(255,215,0,.6);
animation:glow 4s infinite alternate;
}

@keyframes glow{
from{box-shadow:0 0 20px gold,0 0 60px orange}
to{box-shadow:0 0 50px cyan,0 0 150px magenta}
}

/* logo */
.logo{
border-radius:50%;
border:4px solid gold;
box-shadow:0 0 30px gold,0 0 80px orange;
animation:pulse 2s infinite;
}
@keyframes pulse{
0%,100%{transform:scale(1)}
50%{transform:scale(1.1)}
}

/* button */
.join-btn{
background:linear-gradient(135deg,#ffd700,#ff0080);
font-family:'Bebas Neue',sans-serif;
letter-spacing:2px;
padding:18px;
border-radius:15px;
position:relative;
overflow:hidden;
transition:.3s;
}
.join-btn::before{
content:'';
position:absolute;
top:0;left:-100%;
width:100%;height:100%;
background:linear-gradient(90deg,transparent,rgba(255,255,255,.7),transparent);
animation:shine 2s infinite;
}
@keyframes shine{
from{left:-100%}
to{left:200%}
}
.join-btn:hover{
transform:scale(1.1);
box-shadow:0 0 40px gold,0 0 120px magenta;
}

/* live */
.live{
animation:blink 1.5s infinite;
}
@keyframes blink{
0%,100%{opacity:1}
50%{opacity:.4}
}
</style>
</head>

<body class="flex justify-center items-center p-4">

<div class="card max-w-md w-full text-center text-white relative">

<!-- logo -->
<div class="flex justify-center mb-4">

<!-- live -->

<p>🔥 IPL 2025 : <span class="text-yellow-400">Free Tips</span></p>
<p>⭐ 12+ Years Experience</p>
<p>👥 Members Joined: <span id="counter" class="text-cyan-400">10234</span></p>
</div>

<a href="https://t.me/+8DynJXR9E_ZlMzg1" target="_blank" class="join-btn block text-xl">
<i class="fab fa-telegram"></i> JOIN TELEGRAM CHANNEL
</a>

<p class="text-gray-300 text-xs mt-4">
100% Free • Fast Updates • Trusted Brand
</p>

<p id="redirectText" class="text-sm text-red-400 mt-2"></p>

</div>

<script>

particleCount:150,
spread:80,

// member counter

count++;

document.getElementById("redirectText").innerText = "Redirecting in "+sec+" seconds...";
sec--;
if(sec<0){
clearInterval(timer);
window.location.href="https://t.me/+8DynJXR9E_ZlMzg1";

</script>

</body>
